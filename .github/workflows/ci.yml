# Generated by GitHub Copilot
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: credit-card-usage-analysis-prediction-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install coverage tooling
        run: python -m pip install --upgrade pytest-cov

      - name: Compile check
        run: python -m compileall -q api src tests

      - name: Dependency consistency
        run: python -m pip check

      - name: Run unit tests
        run: pytest -q --maxfail=1 --cov=api --cov=src
          --cov-report=term-missing:skip-covered --cov-fail-under=50

      - name: Run API smoke check
        run: |
          uvicorn api.main:app --host 127.0.0.1 --port 8011 &
          APP_PID=$!
          trap "kill $APP_PID" EXIT

          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8011/health >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:8011/health

  dependency-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip-audit

      - name: Scan dependencies
        run: pip-audit -r requirements.txt --progress-spinner off
